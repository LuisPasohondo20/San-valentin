<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje</title>
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg,#fbc2eb,#a6c1ee,#fad0c4,#cfd9df);
    background-size: 400% 400%;
    animation: fondo 20s ease infinite;
}
@keyframes fondo {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}
.chat {
    width: 90%;
    max-width: 380px;
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(12px);
    border-radius: 22px;
    padding: 16px;
}
.mensaje {
    display: none;
    padding: 12px 16px;
    margin-bottom: 10px;
    border-radius: 18px;
    font-size: 15px;
    max-width: 80%;
    animation: aparecer .35s ease;
}
@keyframes aparecer {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; }
}
.ellos { background: white; color: #333; }
.yo { background: #6c63ff; color: white; margin-left: auto; }
.opciones {
    display: none;
    text-align: center;
    margin-top: 10px;
    position: relative;
}
button {
    padding: 10px 16px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    font-size: 14px;
}
.si { background: #6c63ff; color: white; }
.no { background: #ddd; position: relative; }
</style>
</head>
<body>

<div class="chat">
    <!-- INICIO -->
    <div class="mensaje ellos" id="m1">Oye, ¿te puedo preguntar algo? 👀</div>
    <div class="opciones" id="opcionInicio">
        <button class="si" onclick="inicio()">Sí, dime 👀</button>
    </div>
    <div class="mensaje yo" id="rInicio"></div>

    <!-- PREGUNTA PRINCIPAL -->
    <div class="mensaje ellos" id="m2">¿Quieres ser mi San Valentín<br>este 14 de febrero? 💘</div>
    <div class="opciones" id="opciones1">
        <button class="si" onclick="respuestaSi()">Sí 💕</button>
        <button class="no" id="no1" onclick="respuestaNo()">No puedo</button>
    </div>
    <div class="mensaje yo" id="r1"></div>

    <!-- CONFIRMACIÓN -->
    <div class="mensaje ellos" id="mConfirm">¿De verdad puedes este sábado 14 de febrero? 😮</div>
    <div class="opciones" id="opcionesConfirm">
        <button class="si" onclick="confirmarSi()">Sí, de verdad 💖</button>
        <button class="no" onclick="confirmarNo()">No, creo que no 😅</button>
    </div>
    <div class="mensaje yo" id="rConfirm"></div>

    <!-- CAMINO ALTERNO -->
    <div class="mensaje ellos" id="m3">Bueno… pero me debes un beso de tamal 🤭🫣</div>
    <div class="mensaje ellos" id="m4">¿Y una salida el viernes 13 de febrero? 💖</div>
    <div class="opciones" id="opciones2">
        <button class="si" onclick="finalSi()">Sí 💖</button>
        <button class="no" id="no2">No, no voy a poder</button>
    </div>

    <!-- FINAL -->
    <div class="mensaje ellos" id="final">Vale, es una cita 💖✨🤭🤭</div>
</div>

<script>
// Inicio del chat
setTimeout(() => {
    m1.style.display = "block";
    opcionInicio.style.display = "block";
}, 1000);

function inicio() {
    opcionInicio.style.display = "none";
    rInicio.innerText = "Sí, dime 👀";
    rInicio.style.display = "block";
    setTimeout(() => {
        m2.style.display = "block";
        opciones1.style.display = "block";
    }, 1200);
}

// Pregunta principal
let movido1 = false;
function respuestaNo() {
    if (!movido1) {
        no1.style.left = Math.random() * 80 + "px";
        movido1 = true;
    } else {
        opciones1.style.display = "none";
        r1.innerText = "No puedo 😅";
        r1.style.display = "block";
        continuar();
    }
}

function respuestaSi() {
    opciones1.style.display = "none";
    r1.innerText = "Sí 💕";
    r1.style.display = "block";
    setTimeout(() => {
        mConfirm.style.display = "block";
        opcionesConfirm.style.display = "block";
    }, 1200);
}

// Confirmación
function confirmarNo() {
    opcionesConfirm.style.display = "none";
    rConfirm.innerText = "No, creo que no 😅";
    rConfirm.style.display = "block";
    setTimeout(() => { continuar(); }, 1000);
}

function confirmarSi() {
    opcionesConfirm.style.display = "none";
    rConfirm.innerText = "Sí, de verdad 💖";
    rConfirm.style.display = "block";
    setTimeout(() => { final.style.display = "block"; }, 1200);
}

// Camino alterno
function continuar() {
    setTimeout(() => { m3.style.display = "block"; }, 1200);
    setTimeout(() => { m4.style.display = "block"; opciones2.style.display = "block"; }, 2400);
}

// Último botón que se mueve
no2.onclick = () => {
    const maxX = window.innerWidth - no2.offsetWidth - 20;
    const maxY = window.innerHeight - no2.offsetHeight - 20;
    no2.style.position = "absolute";
    no2.style.left = Math.random() * maxX + "px";
    no2.style.top = Math.random() * maxY + "px";
};

// Botón final
function finalSi() {
    opciones2.style.display = "none";
    final.style.display = "block";
}
</script>

</body>
</html>

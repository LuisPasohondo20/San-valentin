<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girasoles 💛</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle,#ff4d88,#990033);
    overflow:hidden;
    font-family: 'Segoe UI', sans-serif;
}

.card{
    width:380px;
    height:520px;
    background:#f5e6d3;
    border-radius:20px;
    position:relative;
    overflow:hidden;
}

/* TEXTO BONITO */
.texto-amor{
    position:absolute;
    top:25px;
    width:100%;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#333;
    opacity:0;
}

.texto-amor span{
    color:#ffcc00;
    font-size:32px;
    text-shadow: 0 0 10px #ffd700, 0 0 20px #ffea00;
}

.mostrarTexto{
    animation: aparecerTexto 2s forwards;
}

@keyframes aparecerTexto{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* TRONCO */
.trunk{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:35px;
    height:0;
    background:linear-gradient(#8b5a2b,#5a3d1e);
    border-radius:20px;
    animation: growTrunk 2s forwards;
}

@keyframes growTrunk{
    to{height:200px;}
}

/* GIRASOLES */
.flower{
    position:absolute;
    font-size:22px;
    opacity:0;
    transform:scale(0);
    animation: bloom 0.5s forwards;
}

@keyframes bloom{
    to{
        opacity:1;
        transform:scale(1);
    }
}

/* CAÍDA */
.fall{
    position:absolute;
    font-size:22px;
    animation: fall 5s linear infinite;
}

@keyframes fall{
    from{transform:translateY(0); opacity:1;}
    to{transform:translateY(400px); opacity:0;}
}

button{
    position:absolute;
    bottom:10px;
    left:50%;
    transform:translateX(-50%);
    padding:10px 15px;
    border:none;
    border-radius:20px;
    background:#ffcc00;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

    <!-- TEXTO -->
    <div class="texto-amor" id="texto">
        Yo te amo <span>3 millones</span> 💛
    </div>

    <div id="tree"></div>

    <button onclick="iniciar()">Presiona 💛</button>
</div>

<script>
function iniciar(){
    document.querySelector("button").style.display="none";

    const tree = document.getElementById("tree");

    // TRONCO
    let trunk=document.createElement("div");
    trunk.className="trunk";
    tree.appendChild(trunk);

    // CORAZÓN
    setTimeout(()=>{
        for(let i=0;i<900;i++){
            let t = Math.random()*Math.PI*2;
            let r = Math.random();

            let centerX = 190;
            let centerY = 220;

            let x = centerX + (130*r)*Math.pow(Math.sin(t),3);
            let y = centerY - (90*r*Math.cos(t)-40*r*Math.cos(2*t)-20*r*Math.cos(3*t));

            let f=document.createElement("div");
            f.className="flower";
            f.innerHTML="🌻";

            f.style.left=x+"px";
            f.style.top=y+"px";

            f.dataset.x = x;
            f.dataset.y = y;

            f.style.animationDelay=(i*0.002)+"s";

            tree.appendChild(f);
        }
    },2000);

    // MOSTRAR TEXTO
    setTimeout(()=>{
        document.getElementById("texto").classList.add("mostrarTexto");
    },3500);

    // CAÍDA
    setTimeout(()=>{
        const flowers = document.querySelectorAll(".flower");

        setInterval(()=>{
            let randomFlower = flowers[Math.floor(Math.random()*flowers.length)];

            let fall=document.createElement("div");
            fall.className="fall";
            fall.innerHTML="🌻";

            fall.style.left = randomFlower.dataset.x + "px";
            fall.style.top = randomFlower.dataset.y + "px";

            document.querySelector(".card").appendChild(fall);

            setTimeout(()=>fall.remove(),5000);
        },150);
    },4000);
}
</script>

</body>
</html>
